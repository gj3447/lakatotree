# PROM16 루프-경계 표준(사이클 예산 · bash 벽시계 · CLI 타입종단) — ooptdd 정식 영수증.
# hermetic: in_process + memory backend(zero-infra). emit-adapter=prom16_loop_receipt.verify 가
# *실제* ProgrammeService.run_cycle / harness_run._bash / cli.main(재구현 금지)을 fake 세계 위에서
# 구동해 예산거부·내구파생·타입종단을 구조화 이벤트로 ship. 음성 오라클 2종(예산게이트 무력화 →
# 소진 트리가 써버림 검출 / timeout 타입화 제거 → 생 예외 검출)으로 vacuous green 차단.
name: lakatotree-prom16-loop-boundary-standard
target:
  mode: in_process
  callable: prom16_loop_receipt:verify       # verify(backend, cid)
  backend: memory
  root: "."   # 러너가 절대 root 로 오버라이드

requirements:
  - id: PROM16-1
    description: 예산 소진 시 run_cycle 이 실행 대신 타입 거부(budget_exhausted) + 쓰기 0(노드 미생성)
    gate:
      - {event: cycle_budget_exhausted_refusal_zero_writes, op: ">=", count: 1}
    longinus:
      kg_anchor: ref_site:PROM16:cycle_budget_exhausted_refusal_zero_writes
      source: prom16_loop_receipt.py
      symbol: verify
      must_emit: cycle_budget_exhausted_refusal_zero_writes
  - id: PROM16-2
    description: 예산 소모는 저장소 파생(내구) — 새 서비스 인스턴스에서도 같은 거부(카운터 리셋 없음)
    gate:
      - {event: cycle_budget_durable_across_instances, op: ">=", count: 1}
  - id: PROM16-3
    description: 미선언(기본)=무제한 + 응답 shape 불변(하위호환) — 예산 키가 응답에 안 끼어듦
    gate:
      - {event: cycle_budget_unset_is_unlimited_shape_stable, op: ">=", count: 1}
  - id: PROM16-4
    description: bash 벽시계 예산 — env 관통(LAKATOTREE_BASH_TIMEOUT) + 초과는 타입 실패(BashTimeout)
    gate:
      - {event: bash_wallclock_timeout_typed, op: ">=", count: 1}
  - id: PROM16-5
    description: CLI 'cycle' 표면 타입 종단 — 실패 spec 이 이유코드+exit≠0 (생 스택트레이스 아님)
    gate:
      - {event: cli_cycle_typed_terminal, op: ">=", count: 1}
  - id: PROM16-6
    description: 음성 오라클 — 예산 게이트 무력화 시 소진 트리가 write 를 감행함이 검출됨(오라클 이빨)
    gate:
      - {event: cycle_budget_negative_oracle, op: ">=", count: 1}
  - id: PROM16-7
    description: 음성 오라클 — timeout 타입화 제거 시 생 TimeoutExpired 가 샘이 검출됨(오라클 이빨)
    gate:
      - {event: bash_timeout_negative_oracle, op: ">=", count: 1}

name: ci

# Clean-container CI for the three authoritative gates LakatoTree declares in README
# "Build & verify": lint-imports (layering) + pytest (engine/server) + lake build (Lean kernel).
# Runs from a fresh checkout with ONLY requirements.txt — so it catches the exact dependency /
# runtime drift that made "tests green" unreproducible before (missing httpx/mcp/lxml/rdflib,
# unpinned FastAPI). "receipts, not claims" applied to the build itself.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine — lint-imports + pytest (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"   # the version the suite is verified green against
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install pinned deps (clean — requirements.txt only)
        run: pip install -r requirements.txt
      - name: lint-imports (layering gate — static, runs first)
        run: lint-imports
      - name: pytest (engine + server contract)
        run: python -m pytest tests/ -q

  integration:
    # #3: 통합티어(실 Neo4j+PG kg_tx 원자성/멱등 = README "가장 consequential" 보증)를 CI 에서 실제로 실행.
    # 전엔 LAKATOS_IT 미설정이라 8개 integration 테스트가 영영 skip(죽은 게이트)이었다.
    # 도입은 비차단(continue-on-error) — flaky Docker/testcontainers 가 메인 게이트를 wedge 하지 않게(안정화 후 차단 승격).
    name: integration — testcontainers Neo4j+PG (LAKATOS_IT, allow-failure)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps (unit + integration tier)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-integration.txt
      - name: pytest integration tier (real Neo4j+PG via testcontainers)
        env:
          LAKATOS_IT: "1"
        run: python -m pytest tests/integration -q

  kernel-quality:
    # #6: 커널 품질 ratchet 을 실제 CI 로. coverage(verdict+quant ≥95%)는 *차단*(현 98%+), mutation 은 비차단.
    # 스크립트는 PY 오버라이드를 지원하므로 runner 에선 PY=python (로컬 .venv 경로 대신).
    name: kernel-quality — coverage ratchet (gate) + mutation (allow-failure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps (unit + dev)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: coverage ratchet (verdict+quant kernel >=95%, gating)
        run: PY=python bash scripts/coverage_kernel.sh
      - name: mutation (verdict kernel mutmut, allow-failure)
        continue-on-error: true
        run: PY=python bash scripts/mutation_kernel.sh

  formal:
    name: formal — lake build (Lean 4, sorry=0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: lake build (toolchain pinned by formal/lean-toolchain → v4.27.0)
        working-directory: formal
        run: lake build   # ground-truth gate: error=0, sorry=0

  ooptdd-receipts:
    # ooptdd-loop 영수증 전체를 자동발견해 상시 재검증 — pytest 가 아니라 R02(구조화 이벤트
    # trace 도착) + R10(Longinus 바인딩) 기준. 각 emit-adapter(ooptdd_receipts/<F>/)가 *실제 고쳐진* 엔진
    # 코드를 in-process 구동하고 음성 오라클을 포함하므로, 엔진이 회귀해 결함이 돌아오면 해당 영수증이 RED.
    # ★self-contained 차단 게이트(continue-on-error 제거): loop runner 를 _vendor/ooptdd_loop (base ooptdd
    #   는 _vendor/ooptdd) 로 벤더해 private repo·시크릿 의존을 없앴다 — requirements.txt(+pyyaml)만으로 돈다.
    name: ooptdd-receipts — all auto-discovered receipts (R02 trace + R10 Longinus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install pinned deps (clean — requirements.txt only)
        run: pip install -r requirements.txt
      - name: re-verify every ooptdd-loop receipt (vendored loop, no secret)
        run: python ooptdd_receipts/run_all.py   # 발견된 전체가 green 아니면 exit 1

  c1verify-standalone:
    # campaign C1 / P0b — engine-independence as a CONSTRUCTION FACT, not a promise. Install ONLY the
    # external verifier into a fresh venv where lakatos/server are NOT present, then run its suite via
    # `--pyargs` against the INSTALLED package (the repo, which contains lakatos/, is never on the path).
    # An accidental `import lakatos` anywhere in c1verify is an ImportError here — not a green test —
    # strictly stronger than the import-linter forbidden contract alone. Stdlib-only: no requirements.txt.
    name: c1verify-standalone — external verifier in a lakatos-free venv (P0b)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: fresh venv with ONLY c1verify (+pytest); engine absent
        run: |
          python -m venv /tmp/c1venv
          /tmp/c1venv/bin/pip install ./c1verify pytest
      - name: assert lakatos/server are NOT importable in this venv
        run: |
          cd /tmp && /tmp/c1venv/bin/python - <<'PY'
          import importlib.util as u
          for m in ("lakatos", "server"):
              assert u.find_spec(m) is None, f"{m} leaked into the clean venv — isolation broken"
          print("clean venv confirmed: lakatos/server absent")
          PY
      - name: run the installed c1verify suite (any engine import => ImportError => RED)
        run: cd /tmp && /tmp/c1venv/bin/python -m pytest --pyargs c1verify.tests -q

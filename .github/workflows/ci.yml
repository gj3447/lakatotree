name: ci

# Clean-container CI for the three authoritative gates LakatoTree declares in README
# "Build & verify": lint-imports (layering) + pytest (engine/server) + lake build (Lean kernel).
# Runs from a fresh checkout with ONLY requirements.txt — so it catches the exact dependency /
# runtime drift that made "tests green" unreproducible before (missing httpx/mcp/lxml/rdflib,
# unpinned FastAPI). "receipts, not claims" applied to the build itself.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine — lint-imports + pytest (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"   # the version the suite is verified green against
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install pinned deps (clean — requirements.txt only)
        run: pip install -r requirements.txt
      - name: lint-imports (layering gate — static, runs first)
        run: lint-imports
      - name: pytest (engine + server contract)
        run: python -m pytest tests/ -q

  integration:
    # #3: 통합티어(실 Neo4j+PG kg_tx 원자성/멱등 = README "가장 consequential" 보증)를 CI 에서 실제로 실행.
    # 전엔 LAKATOS_IT 미설정이라 8개 integration 테스트가 영영 skip(죽은 게이트)이었다.
    # 도입은 비차단(continue-on-error) — flaky Docker/testcontainers 가 메인 게이트를 wedge 하지 않게(안정화 후 차단 승격).
    name: integration — testcontainers Neo4j+PG (LAKATOS_IT, allow-failure)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps (unit + integration tier)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-integration.txt
      - name: pytest integration tier (real Neo4j+PG via testcontainers)
        env:
          LAKATOS_IT: "1"
        run: python -m pytest tests/integration -q

  kernel-quality:
    # #6: 커널 품질 ratchet 을 실제 CI 로. coverage(verdict+quant ≥95%)는 *차단*(현 98%+), mutation 은 비차단.
    # 스크립트는 PY 오버라이드를 지원하므로 runner 에선 PY=python (로컬 .venv 경로 대신).
    name: kernel-quality — coverage ratchet (gate) + mutation (allow-failure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps (unit + dev)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: coverage ratchet (verdict+quant kernel >=95%, gating)
        run: PY=python bash scripts/coverage_kernel.sh
      - name: mutation (verdict kernel mutmut, allow-failure)
        continue-on-error: true
        run: PY=python bash scripts/mutation_kernel.sh

  formal:
    name: formal — lake build (Lean 4, sorry=0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: lake build (toolchain pinned by formal/lean-toolchain → v4.27.0)
        working-directory: formal
        run: lake build   # ground-truth gate: error=0, sorry=0

  ooptdd-receipts:
    # 설계감사 13건(H1~H4·M1~M9)의 ooptdd-loop 영수증을 상시 재검증 — pytest 가 아니라 R02(구조화 이벤트
    # trace 도착) + R10(Longinus 바인딩) 기준. 각 emit-adapter(ooptdd_receipts/<F>/)가 *실제 고쳐진* 엔진
    # 코드를 in-process 구동하고 음성 오라클을 포함하므로, 엔진이 회귀해 결함이 돌아오면 해당 영수증이 RED.
    # 비차단 도입(continue-on-error) — ooptdd-loop 은 별도(private) 레포라 시크릿/레포 ref 확정 후 차단 승격
    # (integration/mutation 잡과 동일한 "안정화 후 승격" 패턴).
    name: ooptdd-receipts — 13 design-audit receipts (R02 trace + R10 Longinus, allow-failure)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: checkout ooptdd-loop (the loop runner — sibling repo)
        uses: actions/checkout@v4
        with:
          repository: gj3447/ooptdd-loop   # TODO: 레포 ref 확정
          path: ooptdd-loop
          token: ${{ secrets.OOPTDD_LOOP_PAT }}      # TODO: private 접근 시크릿 이름 확정
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps (lakatos + ooptdd_loop)
        run: |
          pip install -r requirements.txt     # lakatos + server(fastapi) — server.* 영수증 import 용
          pip install -e ./ooptdd-loop         # ooptdd_loop(loop runner: load_spec/run_loop)
      - name: re-verify 13 design-audit ooptdd-loop receipts
        run: python ooptdd_receipts/run_all.py   # 13/13 green 아니면 exit 1
